
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = fuzzel
$browser = zen-browser


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = qs -c noctalia-shell


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.9
    inactive_opacity = 0.7

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 7
        passes = 3

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     2,     default, slidevert 
    animation = zoomFactor,    1,     7,     quick
}


dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}
scrolling {
    fullscreen_on_one_column = false
    explicit_column_widths = 0.3, 0.5, 0.7
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    mouse {
        
    }
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = altwin:swap_alt_win, caps:swapescape
    kb_rules =

    follow_mouse = 1
    accel_profile = "flat"
    force_no_accel = true

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

workspace = 1
workspace = 2
workspace = 3
workspace = 4
workspace = 5


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod_Ctrl,Escape, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod_Shift, F, exec, $fileManager
bind = $mainMod_Shift, B, exec, $browser
bind = $mainMod, T, togglefloating,
bind = $mainMod, Space, exec, $menu

bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindl  = , XF86AudioMute,        exec, qs -c noctalia-shell ipc call volume muteInput
bindl  = , XF86AudioNext,        exec, qs -c noctalia-shell ipc call media next
bindl  = , XF86AudioPrev,        exec, qs -c noctalia-shell ipc call media previous
bindl  = , XF86AudioPlay,        exec, qs -c noctalia-shell ipc call media playPause
bindl  = , XF86AudioPause,       exec, qs -c noctalia-shell ipc call media playPause

bind = $mainMod, l, layoutmsg, move +col
bind = $mainMod, J,     movefocus, d
bind = $mainMod, K,     movefocus, u
bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, left,  layoutmsg, move -col
bind = $mainMod, down,  movefocus, d
bind = $mainMod, up,    movefocus, u
bind = $mainMod, right, layoutmsg, move +col

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ─── Window Movement ───
bind = $mainMod SHIFT, H,     layoutmsg, swapcol l
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, L,     layoutmsg, swapcol r
bind = $mainMod SHIFT, left,  layoutmsg, swapcol l
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, right, layoutmsg, swapcol r

# ─── Workspace Switching ───
bind = $mainMod, mouse_down,  layoutmsg, move -col
bind = $mainMod, mouse_up,    layoutmsg, move +col
bind = $mainMod SHIFT, mouse_down, layoutmsg, swapcol l
bind = $mainMod SHIFT, mouse_up,   layoutmsg, swapcol r

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

# ─── Layout Controls ───
bind = $mainMod CTRL, F, fullscreen, 0       # true fullscreen
bind = $mainMod, F,      fullscreen, 1       # maximize (was maximize-column)
bind = $mainMod, T,      togglefloating

# resize active window (was set-column-width / set-window-height)
binde = $mainMod, minus,       resizeactive, -100 0
binde = $mainMod, equal,       resizeactive,  100 0
binde = $mainMod SHIFT, minus, resizeactive, 0 -100
binde = $mainMod SHIFT, equal, resizeactive, 0  100
bind = $mainMod, R, layoutmsg, colresize +conf

# ─── Screenshots ───
# Requires: grimblast (hyprland-contrib) or swap for hyprshot
bind = CTRL SHIFT, 1, exec, grimblast copy area    # region
bind = CTRL SHIFT, 2, exec, grimblast copy screen  # full screen
bind = CTRL SHIFT, 3, exec, grimblast copy active  # focused window

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Exit / Power ───
bind = $mainMod CTRL, Escape, exit
bind = $mainMod SHIFT, P,     dpms, off

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
source = /home/sudha/.config/hypr/noctalia/noctalia-colors.conf